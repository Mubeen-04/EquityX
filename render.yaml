services:
  - type: web
    name: zerodha-app
    runtime: node
    plan: free
    buildCommand: "npm install && npm install --prefix ../frontend && npm install --prefix ../dashboard && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
